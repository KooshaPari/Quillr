name: Benchmarks

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  benchmark:
    name: TypeScript Benchmarks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Run benchmarks
        id: benchmark
        run: |
          mkdir -p benchmark-results

          # Check for benchmarks
          if [ -d "benchmark" ] || [ -d "benchmarks" ]; then
            bun run benchmark || bun run bench || true
          else
            echo "No benchmarks directory found"
          fi

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: quillr-benchmark-results-${{ github.sha }}
          path: benchmark-results/
          retention-days: 30

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 'Benchmark results available at: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
            })

  benchmark-regression:
    name: Compare with Main
    runs-on: ubuntu-latest
    needs: benchmark
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download current results
        uses: actions/download-artifact@v4
        with:
          name: quillr-benchmark-results-${{ github.sha }}
          path: current

      - name: Checkout main
        run: |
          git fetch origin main
          git stash
          git checkout origin/main

      - name: Run main benchmarks
        run: |
          mkdir -p main
          bun install
          if [ -d "benchmark" ] || [ -d "benchmarks" ]; then
            bun run benchmark || bun run bench || true
          fi

      - name: Compare results
        run: |
          echo "=== Benchmark Comparison ==="
          echo "Main branch results: main/"
          echo "Current branch results: current/"
